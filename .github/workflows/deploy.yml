name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/deploy/datalingo

            echo "── Pulling latest code ──"
            git pull origin main

            echo "── Backend deps ──"
            source venv/bin/activate
            pip install -r backend/requirements.txt --quiet

            echo "── Frontend build ──"
            cd frontend
            npm install --silent
            npm run build
            cd ..

            echo "── Restarting services ──"
            pm2 restart datalingo-backend
            pm2 restart datalingo-frontend

            echo "── Health check ──"
            sleep 5
            curl -f http://127.0.0.1:8000/health || echo "WARNING: backend health check failed"
            curl -f http://127.0.0.1:3000 || echo "WARNING: frontend health check failed"

            echo "── Deploy complete ──"